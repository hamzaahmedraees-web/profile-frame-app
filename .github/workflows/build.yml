name: Build Android AAB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y python3-pip build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev

    - name: Install Python packages
      run: |
        pip3 install buildozer cython==0.29.33
        pip3 install kivy pillow

    - name: Create App Files
      run: |
        mkdir -p assets
        python3 make_frames.py

    - name: Build AAB
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        buildozer android debug

    - name: Upload AAB
      uses: actions/upload-artifact@v3
      with:
        name: profile-frame-app
        path: bin/*.aab

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: profile-frame-apk
        path: bin/*.apk
